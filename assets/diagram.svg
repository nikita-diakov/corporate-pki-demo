<svg xmlns="http://www.w3.org/2000/svg" width="920" height="260" viewBox="0 0 920 260">
  <rect x="20" y="30" width="250" height="90" rx="16" fill="#0f1b33" stroke="#2a3a5e"/>
  <text x="45" y="70" fill="#eaf0ff" font-size="18" font-family="system-ui" font-weight="700">Root CA</text>
